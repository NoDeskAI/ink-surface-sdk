<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InkSurface SDK Basic Example</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f4ee;
      color: #1d1b18;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f7f4ee;
    }

    .page {
      max-width: 1040px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }

    .header {
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(29, 27, 24, 0.14);
      padding-bottom: 18px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: #5f766f;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .caption {
      max-width: 680px;
      margin: 12px 0 0;
      color: #68635b;
      font-size: 15px;
      line-height: 1.6;
    }

    #app {
      border: 1px solid rgba(29, 27, 24, 0.12);
      border-radius: 8px;
      background: #fffdfa;
      padding: 22px 28px;
      box-shadow: 0 18px 48px rgba(29, 27, 24, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root,
      body {
        background: #171717;
        color: #f3f0e8;
      }

      .header {
        border-bottom-color: rgba(243, 240, 232, 0.16);
      }

      .eyebrow {
        color: #5eead4;
      }

      .caption {
        color: #bbb4a8;
      }

      #app {
        border-color: rgba(243, 240, 232, 0.12);
        background: #1f1f1f;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <p class="eyebrow">InkSurface SDK</p>
      <h1>Document surface rendering without host side effects</h1>
      <p class="caption">
        This example imports the SDK bundle, installs styles explicitly, and renders a local in-memory document model.
      </p>
    </header>
    <article id="app" aria-live="polite"></article>
  </main>

  <script type="module">
    import {
      installInkLoopSurfaceStyles,
      renderInkLoopVisualModel,
    } from 'ink-surface-sdk';

    const model = {
      documentTitle: 'Field Notes on Reading',
      blocks: [
        {
          id: 'blk_title',
          kind: 'heading',
          region: 'editable',
          page: '0',
          content: '# Field Notes on Reading',
          annotations: [],
        },
        {
          id: 'blk_morning',
          kind: 'paragraph',
          region: 'editable',
          page: '0',
          content: 'A quiet paragraph can still carry several layers of thought: source text, reader marks, and a margin note that remains anchored to the same block.',
          annotations: [
            {
              ko_id: 'ko_excerpt_demo',
              kind: 'excerpt',
              title: 'Anchored excerpt',
              body_md: 'A clean highlight over the original text.',
              visual_strokes: [
                {
                  tool: 'highlighter',
                  color: '#facc15',
                  opacity: 0.54,
                  points: [
                    { x: 0.02, y: 0.34 },
                    { x: 0.92, y: 0.34 },
                  ],
                },
              ],
            },
          ],
        },
        {
          id: 'blk_weather',
          kind: 'paragraph',
          region: 'editable',
          page: '0',
          content: 'A second block shows freehand pen strokes. The SDK stores the stroke as normalized block coordinates so the host can render it in Web, Obsidian, or another runtime.',
          annotations: [
            {
              ko_id: 'ko_pen_demo',
              kind: 'annotation',
              title: 'Pen stroke',
              body_md: 'The pen color and opacity are explicit so dark themes stay legible.',
              visual_strokes: [
                {
                  tool: 'pen',
                  color: '#38bdf8',
                  opacity: 0.94,
                  points: [
                    { x: 0.04, y: 0.18 },
                    { x: 0.18, y: 0.08 },
                    { x: 0.42, y: 0.12 },
                    { x: 0.68, y: 0.36 },
                    { x: 0.9, y: 0.28 },
                  ],
                },
              ],
            },
          ],
        },
      ],
    };

    installInkLoopSurfaceStyles();
    document.getElementById('app').replaceChildren(renderInkLoopVisualModel(model));
  </script>
</body>
</html>
