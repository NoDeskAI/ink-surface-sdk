<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InkLoop · Source Reading Host</title>
</head>
<body>
  <header id="topbar">
    <div class="doc-meta">
      <span id="doc-name"></span>
      <span id="page-ind"></span>
    </div>
    <div class="top-ctl">
      <input type="file" id="file-in" accept="application/pdf,application/epub+zip,text/markdown,.pdf,.epub,.md,.markdown" hidden />
      <button id="home-btn" class="ghost doc-only back-btn" title="返回">‹ 返回</button>
      <span class="vsep doc-only"></span>
      <button id="prev" class="ghost doc-only" title="上一页 ←">‹</button>
      <button id="next" class="ghost doc-only" title="下一页 →">›</button>
      <span class="vsep doc-only"></span>
      <div class="seg-control doc-only" role="group" aria-label="页面布局">
        <button id="layout-single" type="button" class="seg-btn" aria-pressed="true" title="单页布局">单页</button>
        <button id="layout-spread" type="button" class="seg-btn" aria-pressed="false" title="双页布局">双页</button>
      </div>
      <select id="zoom-mode" class="zoom-mode doc-only" aria-label="缩放方式">
        <option value="fit-page">适应页面</option>
        <option value="fit-width">适应宽度</option>
        <option value="0.25">25%</option>
        <option value="0.5">50%</option>
        <option value="0.75">75%</option>
        <option value="1">100%</option>
        <option value="1.5">150%</option>
        <option value="2">200%</option>
        <option value="custom" hidden>自定义缩放</option>
      </select>
      <button id="zoom-out" class="ghost doc-only" title="缩小">−</button>
      <span id="zoom-ind" class="zoom-ind doc-only">100%</span>
      <button id="zoom-in" class="ghost doc-only" title="放大">＋</button>
      <button id="view-toggle" class="ghost doc-only" title="切换原版 / 阅读视图">阅读</button>
      <button id="insight-toggle" class="ghost doc-only" title="查看当前文档的标记与 AI 旁注记录">标记记录</button>
    </div>
    <div id="import-status" class="import-status" hidden aria-live="polite"></div>
  </header>

  <main>
    <section id="reading">
      <div id="stage-wrap">
        <div id="stage">
          <canvas id="page-layer"></canvas>
          <canvas id="ink-layer"></canvas>
          <div id="whisper-layer"></div>
          <div id="empty-state">
            <div id="recent-books" class="recent-books"></div>
          </div>
        </div>
      </div>
      <div id="reader" hidden></div>
      <nav id="toolbar" aria-label="标注工具"></nav>
    </section>

    <aside id="insight">
      <div class="panel-head">
        <span class="panel-title">标记记录</span>
        <span id="insight-count" class="panel-count"></span>
      </div>
      <div id="cards"><p class="empty-hint">标注后，AI 旁注和标记记录会在这里留存回看</p></div>
      <div id="panel-foot"></div>
    </aside>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
